groups:
  - name: checkout-slo
    rules:
      # Adapted from docs/04-walkthrough.md (the synthetic-journey rule):
      # no synthetics in this stack, so the SLO watches payment's server-span
      # p99 computed from spanmetrics — which counts pre-tail-sampling.
      - alert: CheckoutP99Slow
        expr: >
          histogram_quantile(0.99, sum by (le) (
            rate(traces_span_metrics_duration_seconds_bucket{service_name="payment", span_kind="SPAN_KIND_SERVER"}[2m])
          )) > 2
        for: 2m
        labels:
          severity: page
          team: payments
        annotations:
          summary: "payment p99 is {{ $value | humanize }}s (SLO 2s) — checkout is slow"
          dashboard: http://localhost:3000/d/checkout-red
