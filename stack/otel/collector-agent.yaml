# "Node-local" agent tier: accept OTLP from the apps fast, enrich with
# environment metadata, batch, forward everything to the gateway tier.
# (In k8s this would be a DaemonSet running k8sattributes; in compose the
# resource processor stands in for that enrichment.)
receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  memory_limiter:            # always first: refuse before you swell
    check_interval: 1s
    limit_mib: 160
    spike_limit_mib: 48
  resource:
    attributes:
      - key: deployment.environment
        value: local
        action: upsert
  batch: {}                  # always last before exporters

exporters:
  otlp:
    endpoint: otel-gateway:4317
    tls:
      insecure: true

extensions:
  health_check:            # GET :13133 — is this collector alive?
    endpoint: 0.0.0.0:13133
  zpages:                  # http://localhost:55679/debug/... — live pipeline internals
    endpoint: 0.0.0.0:55679

service:
  extensions: [health_check, zpages]
  telemetry:
    metrics:
      level: normal
      readers:
        - pull:
            exporter:
              prometheus:
                host: 0.0.0.0
                port: 8888
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [otlp]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [otlp]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [otlp]
